[build]
# Default build target for ESP32-S3 (Xtensa)
target = "xtensa-esp32s3-none-elf"

[target.'cfg(target_arch = "xtensa")']
runner    = "bash tools/isolarail-runner"
rustflags = [
  # Link script + defmt script
  "-C", "link-arg=-Wl,-Tlinkall.x",
  "-C", "link-arg=-nostartfiles",
  "-C", "link-arg=-Tdefmt.x",
]

[env]
DEFMT_LOG = "info"
# Increase Embassy executor task arena to avoid runtime panics when spawning
# multiple async tasks. See https://docs.rs/embassy-executor/latest/embassy_executor/ (Task arena).
# Default is 4096 bytes which is insufficient for our task set.
EMBASSY_EXECUTOR_TASK_ARENA_SIZE = "65536"

[unstable]
build-std = ["core", "alloc"]
