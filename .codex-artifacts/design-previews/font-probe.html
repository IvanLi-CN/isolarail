<!doctype html><html><head><meta charset='utf-8'><title>Font Probe</title><style>
body{margin:0;padding:32px;background:#f3f6fb;color:#111;font-family:system-ui}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#fff;border:1px solid #d8deea;border-radius:16px;padding:16px}
label{display:block;font:700 12px/1.4 system-ui;color:#667;margin-bottom:12px}
.sample{font-size:56px;line-height:.94;letter-spacing:-.04em}
.a{font-family:'Skia'}
.b{font-family:'Helvetica Neue';font-weight:900;transform:scaleX(1.18);transform-origin:left center;display:inline-block}
.c{font-family:'Helvetica Neue';font-weight:700;font-stretch:condensed;display:inline-block;transform:scaleX(1.14);transform-origin:left center}
.d{font-family:'Futura';font-weight:800;display:inline-block;transform:scaleX(1.12);transform-origin:left center}
.e{font-family:'Monaspace Neon';font-weight:800}
.f{font-family:'Monaspace Radon';font-weight:800}
.g{font-family:'Monaspace Argon';font-weight:800}
</style></head><body><div class='grid'>
<div class='card'><label>Skia</label><div class='sample a'>IsolaRail</div></div>
<div class='card'><label>Helvetica Neue Black scaled</label><div class='sample b'>IsolaRail</div></div>
<div class='card'><label>Helvetica Neue Bold scaled</label><div class='sample c'>IsolaRail</div></div>
<div class='card'><label>Futura scaled</label><div class='sample d'>IsolaRail</div></div>
<div class='card'><label>Monaspace Neon</label><div class='sample e'>IsolaRail</div></div>
<div class='card'><label>Monaspace Radon</label><div class='sample f'>IsolaRail</div></div>
<div class='card'><label>Monaspace Argon</label><div class='sample g'>IsolaRail</div></div>
</div></body></html>
