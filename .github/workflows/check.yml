name: Code Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Rust toolchain for Xtensa (ESP32-S3)
      uses: esp-rs/xtensa-toolchain@v1.5
      with:
        default: false
        buildtargets: esp32s3
        override: true
        ldproxy: false

    - name: Ensure clippy/rustfmt for esp toolchain
      run: |
        rustup component add clippy --toolchain esp || true
        rustup component add rustfmt --toolchain esp || true
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Check code formatting
      run: cargo +esp fmt --all -- --check
    
    - name: Run clippy
      run: cargo +esp clippy --bins --examples --no-deps --target xtensa-esp32s3-none-elf -- -D warnings
    
    - name: Build main binary (release)
      run: cargo +esp build --release --target xtensa-esp32s3-none-elf
    
    - name: Build examples (release)
      run: cargo +esp build --examples --release --target xtensa-esp32s3-none-elf
    
    - name: Skip binary packaging for ESP32-S3
      run: echo "Packaging .bin is skipped; use ELF with espflash for flashing."
    
    - name: Check build artifacts
      run: |
        if [ ! -f target/xtensa-esp32s3-none-elf/release/iso-usb-hub ]; then
          echo "Build failed: main binary not found"
          exit 1
        fi
        echo "Build successful: binary size $(stat -c%s target/xtensa-esp32s3-none-elf/release/iso-usb-hub) bytes"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: build-artifacts-${{ github.sha }}-esp32s3
        path: |
          target/xtensa-esp32s3-none-elf/release/iso-usb-hub
          target/xtensa-esp32s3-none-elf/release/examples/*
        retention-days: 7
