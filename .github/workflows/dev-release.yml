name: Development Release

on:
  push:
    branches: [ main ]

jobs:
  dev-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Install Rust toolchain for Xtensa (ESP32-S3)
      uses: esp-rs/xtensa-toolchain@v1.5
      with:
        default: false
        buildtargets: esp32s3
        export: true
        ldproxy: false

    - name: Ensure clippy/rustfmt for esp toolchain
      run: |
        rustup component add clippy --toolchain esp || true
        rustup component add rustfmt --toolchain esp || true
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Build release binary (ESP32-S3)
      run: cargo +esp build --release --target xtensa-esp32s3-none-elf
    
    - name: Build examples
      run: cargo +esp build --examples --target xtensa-esp32s3-none-elf --release
    
    - name: Generate development version
      id: dev_version
      run: |
        # Generate development version: dev-YYYYMMDD-HHMMSS-short_commit_hash
        DEV_VERSION="dev-$(date +'%Y%m%d-%H%M%S')-$(git rev-parse --short HEAD)"
        echo "version=$DEV_VERSION" >> $GITHUB_OUTPUT
        echo "Development version: $DEV_VERSION"
    
    - name: Create development release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.dev_version.outputs.version }}
        name: "Development Build ${{ steps.dev_version.outputs.version }} (ESP32-S3)"
        body: |
          🚧 **Development Build**

          **Commit Message:** ${{ github.event.head_commit.message }}
          **Commit Hash:** ${{ github.sha }}
          **Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')

          ⚠️ This is an automatically generated development version for testing purposes only.

          ## File Description
          - `esp32s3-hello-world` - Main firmware (ELF format)
          - `examples/` - Example programs

          ## How to Flash Firmware
          ```bash
          # Using espflash to flash ELF directly
          cargo install espflash
          espflash flash --monitor target/xtensa-esp32s3-none-elf/release/esp32s3-hello-world

          # Or using cargo run with esp toolchain (requires local setup via espup)
          cargo +esp run --release
          ```
        files: |
          target/xtensa-esp32s3-none-elf/release/esp32s3-hello-world
          target/xtensa-esp32s3-none-elf/release/examples/*
        prerelease: true
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Clean up old development releases
      uses: actions/github-script@v7
      with:
        script: |
          const { data: releases } = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });

          // Keep the latest 10 development versions, delete older ones
          const devReleases = releases
            .filter(release => release.tag_name.startsWith('dev-'))
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

          if (devReleases.length > 10) {
            const releasesToDelete = devReleases.slice(10);
            for (const release of releasesToDelete) {
              console.log(`Deleting old dev release: ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              // Also delete the corresponding tag
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                console.log(`Failed to delete tag ${release.tag_name}: ${error.message}`);
              }
            }
          }
