name: Docs Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve docs base
        run: |
          if [ -n "${{ vars.DOCS_BASE }}" ]; then
            echo "DOCS_BASE=${{ vars.DOCS_BASE }}" >> "$GITHUB_ENV"
          elif [ -f docs-site/docs/public/CNAME ]; then
            echo "DOCS_BASE=/" >> "$GITHUB_ENV"
          else
            echo "DOCS_BASE=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs site
        run: bun run docs:build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/doc_build

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
