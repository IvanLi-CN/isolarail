name: Site Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: site-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve publish bases
        run: |
          normalize_base() {
            local raw="$1"
            raw="${raw#/}"
            raw="/${raw}"
            if [ "$raw" != "/" ] && [ "${raw%/}" = "$raw" ]; then
              raw="${raw}/"
            fi
            echo "$raw"
          }

          if [ -f docs-site/docs/public/CNAME ]; then
            site_base="/"
          else
            site_base="/${{ github.event.repository.name }}/"
          fi

          site_base="$(normalize_base "$site_base")"

          if [ "$site_base" = "/" ]; then
            docs_base="/docs/"
          else
            docs_base="${site_base%/}/docs/"
          fi

          echo "SITE_BASE=$site_base" >> "$GITHUB_ENV"
          echo "DOCS_BASE=$docs_base" >> "$GITHUB_ENV"
          echo "VITE_BASE=$site_base" >> "$GITHUB_ENV"
          echo "VITE_DOCS_URL=$docs_base" >> "$GITHUB_ENV"
          echo "Resolved SITE_BASE=$site_base DOCS_BASE=$docs_base"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install docs dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --cwd web --frozen-lockfile

      - name: Build web app
        run: |
          export VITE_BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          export VITE_BUILD_SHA="${{ github.sha }}"
          export VITE_ISSUES_URL="${{ format('{0}/{1}/issues', github.server_url, github.repository) }}"
          export VITE_RELEASE_VERSION="${{ github.ref_name }}"
          export VITE_REPO_URL="${{ format('{0}/{1}', github.server_url, github.repository) }}"
          bun run --cwd web build

      - name: Build docs site
        run: bun run docs:build

      - name: Assemble combined site artifact
        run: bun run site:assemble

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-publish
          path: .site-publish

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site-publish

  deploy_pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy_edgeone:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-publish
          path: .site-publish

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - name: Deploy to EdgeOne Makers direct-upload project
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_PROJECT_NAME: ${{ vars.EDGEONE_PROJECT_NAME }}
        run: npx edgeone makers deploy ./.site-publish -n "$EDGEONE_PROJECT_NAME" -t "$EDGEONE_API_TOKEN" -e production
