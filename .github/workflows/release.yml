name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Is this a prerelease version'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Install Rust toolchain for Xtensa (ESP32-S3)
      uses: esp-rs/xtensa-toolchain@v1.5
      with:
        default: false
        buildtargets: esp32s3
        export: true
        ldproxy: false

    - name: Ensure clippy/rustfmt for esp toolchain
      run: |
        rustup component add clippy --toolchain esp || true
        rustup component add rustfmt --toolchain esp || true
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Generate semantic version
      id: version
      uses: paulhatch/semantic-version@v5.4.0
      with:
        tag_prefix: "v"
        major_pattern: "BREAKING CHANGE:"
        minor_pattern: "feat:"
        version_format: "${major}.${minor}.${patch}"
        bump_each_commit: false
        search_commit_body: true
        user_format_type: "csv"
        enable_prerelease_mode: ${{ github.event.inputs.prerelease }}
        debug: false
    
    - name: Override version type if specified
      id: final_version
      run: |
        if [ "${{ github.event.inputs.version_type }}" = "major" ]; then
          VERSION="${{ steps.version.outputs.major_version }}"
        elif [ "${{ github.event.inputs.version_type }}" = "minor" ]; then
          VERSION="${{ steps.version.outputs.minor_version }}"
        else
          VERSION="${{ steps.version.outputs.version }}"
        fi
        
        if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
          VERSION="${VERSION}-rc.$(date +'%Y%m%d%H%M%S')"
        fi
        
        echo "version=v$VERSION" >> $GITHUB_OUTPUT
        echo "Final version: v$VERSION"
    
    - name: Build release binary (ESP32-S3)
      run: cargo +esp build --release --target xtensa-esp32s3-none-elf
    
    - name: Build examples
      run: cargo +esp build --examples --target xtensa-esp32s3-none-elf --release

    - name: Skip binary packaging for ESP32-S3
      run: echo "Packaging .bin is skipped; use ELF with espflash for flashing."
    
    - name: Generate changelog
      id: changelog
      run: |
        # Get the last release tag
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

        if [ -z "$LAST_TAG" ]; then
          echo "## Changes" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Initial release" >> CHANGELOG.md
        else
          echo "## Changes" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          # Generate commit log
          git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD >> CHANGELOG.md

          if [ ! -s CHANGELOG.md ] || [ "$(wc -l < CHANGELOG.md)" -le 2 ]; then
            echo "- Code optimization and bug fixes" >> CHANGELOG.md
          fi
        fi
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat CHANGELOG.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.final_version.outputs.version }}
        name: "Release ${{ steps.final_version.outputs.version }} (ESP32-S3)"
        body: |
          🎉 **Official Release (ESP32-S3)**

          ${{ steps.changelog.outputs.changelog }}

          ## Build Information
          - **Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')
          - **Commit Hash:** ${{ github.sha }}
          - **Rust Toolchain:** esp (installed via espup)
          - **Target Architecture:** xtensa-esp32s3-none-elf (ESP32‑S3)

          ## Files
          - `esp32s3-hello-world` - Main firmware (ELF with debug info)
          - `examples/` - Example ELF binaries

          ## Flashing and Usage
          - Recommended: `espflash` can flash ELF directly.
          ```bash
          # Install espflash (locally)
          cargo install espflash

          # Flash and monitor (replace PORT if needed)
          espflash flash --monitor target/xtensa-esp32s3-none-elf/release/esp32s3-hello-world
          ```

          - Development (requires esp toolchain locally):
          ```bash
          cargo +esp run --release
          ```

          ## Hardware
          - ESP32‑S3 development board
      files: |
        target/xtensa-esp32s3-none-elf/release/esp32s3-hello-world
        target/xtensa-esp32s3-none-elf/release/examples/*
        prerelease: ${{ github.event.inputs.prerelease }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
