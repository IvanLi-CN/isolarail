name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Is this a prerelease version'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: thumbv7em-none-eabihf
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Generate semantic version
      id: version
      uses: paulhatch/semantic-version@v5.4.0
      with:
        tag_prefix: "v"
        major_pattern: "BREAKING CHANGE:"
        minor_pattern: "feat:"
        version_format: "${major}.${minor}.${patch}"
        bump_each_commit: false
        search_commit_body: true
        user_format_type: "csv"
        enable_prerelease_mode: ${{ github.event.inputs.prerelease }}
        debug: false
    
    - name: Override version type if specified
      id: final_version
      run: |
        if [ "${{ github.event.inputs.version_type }}" = "major" ]; then
          VERSION="${{ steps.version.outputs.major_version }}"
        elif [ "${{ github.event.inputs.version_type }}" = "minor" ]; then
          VERSION="${{ steps.version.outputs.minor_version }}"
        else
          VERSION="${{ steps.version.outputs.version }}"
        fi
        
        if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
          VERSION="${VERSION}-rc.$(date +'%Y%m%d%H%M%S')"
        fi
        
        echo "version=v$VERSION" >> $GITHUB_OUTPUT
        echo "Final version: v$VERSION"
    
    - name: Build release binary
      run: cargo build --bin iso-usb-hub --target thumbv7em-none-eabihf --release
    
    - name: Build examples
      run: cargo build --examples --target thumbv7em-none-eabihf --release

    - name: Install cargo-binutils
      run: cargo install cargo-binutils

    - name: Install llvm-tools-preview
      run: rustup component add llvm-tools-preview

    - name: Generate binary files
      run: |
        cargo objcopy --bin iso-usb-hub --target thumbv7em-none-eabihf --release -- -O binary target/thumbv7em-none-eabihf/release/iso-usb-hub.bin
        echo "Generated binary file: iso-usb-hub.bin ($(stat -c%s target/thumbv7em-none-eabihf/release/iso-usb-hub.bin) bytes)"
    
    - name: Generate changelog
      id: changelog
      run: |
        # Get the last release tag
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

        if [ -z "$LAST_TAG" ]; then
          echo "## Changes" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Initial release" >> CHANGELOG.md
        else
          echo "## Changes" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          # Generate commit log
          git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD >> CHANGELOG.md

          if [ ! -s CHANGELOG.md ] || [ "$(wc -l < CHANGELOG.md)" -le 2 ]; then
            echo "- Code optimization and bug fixes" >> CHANGELOG.md
          fi
        fi
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat CHANGELOG.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.final_version.outputs.version }}
        name: "Release ${{ steps.final_version.outputs.version }}"
        body: |
          🎉 **Official Release**

          ${{ steps.changelog.outputs.changelog }}

          ## Build Information
          - **Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')
          - **Commit Hash:** ${{ github.sha }}
          - **Rust Version:** stable
          - **Target Architecture:** thumbv7em-none-eabihf (STM32G431CB)

          ## File Description
          - `iso-usb-hub` - Main firmware file (ELF format with debug info)
          - `iso-usb-hub.bin` - Binary firmware file
          - `examples/` - Example programs

          ## Flashing and Usage Instructions

          ### 1. Using probe-rs
          ```bash
          # Install probe-rs
          cargo install probe-rs --features cli

          # Flash firmware
          probe-rs run --chip STM32G431CBUx iso-usb-hub
          ```

          ### 2. Using cargo run (recommended for development)
          ```bash
          # Clone repository
          git clone https://github.com/your-username/iso-usb-hub.git
          cd iso-usb-hub

          # Run directly (requires .cargo/config.toml configuration)
          cargo run --bin iso-usb-hub --release
          ```

          ### 3. Using other STM32 flashing tools
          ```bash
          # Using st-flash
          st-flash write iso-usb-hub.bin 0x8000000

          # Using openocd
          openocd -f interface/stlink.cfg -f target/stm32g4x.cfg -c "program iso-usb-hub.bin 0x8000000 verify reset exit"
          ```

          ## Hardware Requirements
          - STM32G431CB microcontroller
          - 160×40 pixel GC9D01 round display
          - SW2303 PD controller
          - TCA6424 I/O expander
          - W25Q128 SPI Flash
          - 5-way digital joystick
        files: |
          target/thumbv7em-none-eabihf/release/iso-usb-hub
          target/thumbv7em-none-eabihf/release/iso-usb-hub.bin
          target/thumbv7em-none-eabihf/release/examples/*
        prerelease: ${{ github.event.inputs.prerelease }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
