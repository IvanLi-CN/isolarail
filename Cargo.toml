[package]
name = "esp32s3-hello-world"
version = "0.1.0"
authors = ["Ivan Li<ivanli2048@gmail.com>"]
edition = "2021"
publish = false

[dependencies]
embassy-executor = { version = "0.7.0", features = ["task-arena-size-20480"] }
embassy-time = "0.4.0"
esp-backtrace = { version = "0.15.0", features = [
    "esp32s3",
    "panic-handler",
    "println",
] }
esp-bootloader-esp-idf = { version = "0.1.0" }
esp-hal = { version = "0.23.0", features = ["esp32s3"] }
esp-hal-embassy = { version = "0.6.0", features = ["esp32s3"] }
esp-println = { version = "0.13.0", features = ["esp32s3"] }

[profile.release]
debug = true
debug-assertions = true
lto = "fat"
codegen-units = 1
