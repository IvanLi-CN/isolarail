<?xml version="1.0" encoding="UTF-8"?>
<svg width="160" height="50" viewBox="0 0 160 50" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- 1-bit wireframe: black strokes on white background, 160x50 px -->
  <rect x="0.5" y="0.5" width="159" height="49" fill="#ffffff" stroke="#000000" stroke-width="1"/>

  <!-- Vertical column separators at 40, 80, 120 px -->
  <line x1="40.5" y1="0" x2="40.5" y2="50" stroke="#000000" stroke-width="1"/>
  <line x1="80.5" y1="0" x2="80.5" y2="50" stroke="#000000" stroke-width="1"/>
  <line x1="120.5" y1="0" x2="120.5" y2="50" stroke="#000000" stroke-width="1"/>

  <!-- Horizontal guides: header, values (3 rows), power bar area top -->
  <line x1="0" y1="8.5" x2="160" y2="8.5" stroke="#000000" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="0" y1="16.5" x2="160" y2="16.5" stroke="#000000" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="0" y1="24.5" x2="160" y2="24.5" stroke="#000000" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="0" y1="32.5" x2="160" y2="32.5" stroke="#000000" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="0" y1="42.5" x2="160" y2="42.5" stroke="#000000" stroke-width="1"/>

  <!-- Column labels -->
  <g font-family="monospace" font-size="7" fill="#000000">
    <text x="20"  y="7" text-anchor="middle">C1</text>
    <text x="60"  y="7" text-anchor="middle">C2</text>
    <text x="100" y="7" text-anchor="middle">C3</text>
    <text x="140" y="7" text-anchor="middle">C4</text>
  </g>

  <!-- Sample values (fit within ~36 px text area per column) -->
  <g font-family="monospace" font-size="7" fill="#000000">
    <!-- Row: Voltage -->
    <text x="20"  y="15" text-anchor="middle">5.12V</text>
    <text x="60"  y="15" text-anchor="middle">9.00V</text>
    <text x="100" y="15" text-anchor="middle">20.0V</text>
    <text x="140" y="15" text-anchor="middle">--</text>

    <!-- Row: Current -->
    <text x="20"  y="23" text-anchor="middle">0.98A</text>
    <text x="60"  y="23" text-anchor="middle">2.50A</text>
    <text x="100" y="23" text-anchor="middle">650mA</text>
    <text x="140" y="23" text-anchor="middle">0mA</text>

    <!-- Row: Power -->
    <text x="20"  y="31" text-anchor="middle">4.9W</text>
    <text x="60"  y="31" text-anchor="middle">22.5W</text>
    <text x="100" y="31" text-anchor="middle">13.0W</text>
    <text x="140" y="31" text-anchor="middle">0W</text>
  </g>

  <!-- Power bar outlines per column (y=44 to 48) -->
  <g stroke="#000000" fill="none" stroke-width="1">
    <rect x="3"   y="44" width="34" height="4"/>
    <rect x="43"  y="44" width="34" height="4"/>
    <rect x="83"  y="44" width="34" height="4"/>
    <rect x="123" y="44" width="34" height="4"/>
  </g>

  <!-- Example filled portions (black fill = 1-bit) -->
  <g fill="#000000" stroke="none">
    <rect x="3"   y="44" width="20" height="4"/>
    <rect x="43"  y="44" width="30" height="4"/>
    <rect x="83"  y="44" width="15" height="4"/>
    <!-- last column empty to illustrate 0% -->
  </g>
</svg>

